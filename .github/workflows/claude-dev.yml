name: Claude Dev Agent

on:
  issues:
    types: [assigned, labeled]
  issue_comment:
    types: [created]

jobs:
  claude-dev:
    # Run when:
    #   1. Issue is assigned (manual trigger)
    #   2. Issue gets 'agent:ready' label (pipeline or manual)
    #   3. Someone comments @claude on an issue
    if: >
      (github.event_name == 'issues' && github.event.action == 'assigned') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' &&
       github.event.label.name == 'agent:ready') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !github.event.issue.pull_request)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Extract Linear issue ID
        id: linear
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          LINEAR_REF=$(echo "$ISSUE_BODY" | grep -oP '[A-Z]+-\d+' | head -1 || true)
          LINEAR_URL=$(echo "$ISSUE_BODY" | grep -oP 'https://linear\.app/[^\s\)]+' | head -1 || true)
          echo "ref=$LINEAR_REF" >> $GITHUB_OUTPUT
          echo "url=$LINEAR_URL" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: "agent:ready"
          assignee_trigger: "claude"
          # TODO: Adjust --max-turns and --allowedTools for your project
          claude_args: '--max-turns 40 --allowedTools "Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(tsc:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(cp:*),Bash(mv:*),Bash(chmod:*),Bash(git:*),Bash(gh:*)"'
          prompt: |
            You are a dev agent working on a GitHub issue. Read the issue carefully and implement the requested changes.

            ## Workflow

            1. **Understand**: Read the issue title and body. Identify requirements, acceptance criteria, and affected files.
            2. **Implement**: Write the code changes. Follow patterns in CLAUDE.md.
            3. **Test**: Run `npm test` to verify tests pass. If the issue specifies test requirements, write and run those tests too.
            4. **Type check**: Run `npx tsc --noEmit` to verify TypeScript compiles cleanly.
            5. **Commit**: Stage your changes and commit with a descriptive message.
            6. **Create PR**: Push your branch and create a pull request:
               ```
               gh pr create --title "<short title>" --body "Closes #${{ github.event.issue.number }}

               ## Summary
               <what changed and why>

               ## Completed
               - [x] <requirement 1>
               - [x] <requirement 2>
               - [ ] <anything not completed - explain why>

               ## Test plan
               <how this was tested>"
               ```

            ## Progress Tracking (CRITICAL)

            The GitHub issue body contains checkboxes. You MUST update these checkboxes **in real time as you complete each item** - not in a batch at the end.

            **How**: After completing each requirement, run `gh issue view ${{ github.event.issue.number }} --json body -q .body` to get the current body, check off the items (`- [ ]` to `- [x]`), then update with `gh issue edit ${{ github.event.issue.number }} --body "<full updated body>"`.

            Aim for 3-5 progress updates over the course of the run.

            ## Rules

            - Follow existing patterns in the codebase (see CLAUDE.md)
            - Use GitHub issue number #${{ github.event.issue.number }} in the PR body (NOT Linear IDs)
            - Use the Write tool to create new files (auto-creates directories)
            - Update issue checkboxes incrementally as you work

            ## Context

            GitHub issue: #${{ github.event.issue.number }}
            Linear issue: ${{ env.LINEAR_ISSUE_REF }} ${{ env.LINEAR_ISSUE_URL }}
        env:
          LINEAR_ISSUE_REF: ${{ steps.linear.outputs.ref }}
          LINEAR_ISSUE_URL: ${{ steps.linear.outputs.url }}
